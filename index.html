<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fly Counter 🪰</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>🪰 Fly Counter 🪰</h1>
    <p class="subtitle">Track flies in your friends' ears!</p>
    <button id="admin-toggle" class="admin-toggle" aria-label="Toggle admin mode">🔒</button>
  </header>

  <main>
    <form id="add-friend-form" class="add-friend">
      <input
        type="text"
        id="friend-name"
        placeholder="Friend's name..."
        autocomplete="off"
        maxlength="30"
        required
      >
      <button type="submit" class="btn btn-add">+ Add Friend</button>
    </form>

    <div id="friends-grid" class="friends-grid"></div>

    <div id="empty-state" class="empty-state">
      <span class="empty-fly">🪰</span>
      <p>No friends yet!<br>Add someone to start counting flies.</p>
    </div>

    <button id="clear-all-btn" class="btn btn-clear-all" hidden>
      🗑️ Clear All
    </button>
  </main>

  <!-- PIN Modal -->
  <div id="pin-modal" class="modal-overlay" hidden>
    <div class="modal">
      <h2 id="modal-title">Enter PIN</h2>
      <p id="modal-subtitle" class="modal-sub"></p>
      <input type="password" id="pin-input" class="pin-input" maxlength="10" placeholder="****" inputmode="numeric" autocomplete="off">
      <p id="modal-error" class="modal-error" hidden>Wrong PIN!</p>
      <div class="modal-buttons">
        <button id="modal-cancel" class="btn btn-modal btn-modal-cancel">Cancel</button>
        <button id="modal-confirm" class="btn btn-modal btn-modal-confirm">Confirm</button>
      </div>
    </div>
  </div>

  <footer>
    <p>Made with 🪰 and ❤️</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
